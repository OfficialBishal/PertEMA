name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: tests (python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 scipy==1.17.1 pandas==3.0.1 scikit-learn==1.8.0 xgboost==3.2.0 \
                      fastapi uvicorn httpx python-multipart pytest
          pip install -e . --no-deps
      - name: Import the package
        run: python -c "import pertema; print(pertema.__version__)"
      - name: Unit tests (pytest)
        run: python -m pytest tests/ -q
      - name: Scoring core test (deterministic, from the committed frozen model)
        run: python app/backend/test_scoring.py
      - name: End-to-end API test
        run: python app/backend/test_api.py
