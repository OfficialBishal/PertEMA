site_name: PertEMA
site_description: Post-hoc reliability estimation for single-cell perturbation prediction
site_url: https://pertema.readthedocs.io/
repo_url: https://github.com/OfficialBishal/PertEMA
repo_name: OfficialBishal/PertEMA
docs_dir: docs

theme:
  name: material
  palette:
    scheme: default
    primary: teal
    accent: teal
  features:
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_root_heading: true
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Interpreting reliability: interpreting_reliability.md
  - API reference: api.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
